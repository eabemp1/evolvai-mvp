services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evolvai-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://evolvai:evolvai@postgres:5432/evolvai
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: evolvai-frontend
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: evolvai-postgres
    environment:
      POSTGRES_DB: evolvai
      POSTGRES_USER: evolvai
      POSTGRES_PASSWORD: evolvai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evolvai-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
